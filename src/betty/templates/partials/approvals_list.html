{% if patterns %}
<table><thead><tr><th>Tool</th><th>Pattern</th><th>Decision</th><th>Count</th><th>Auto-approve</th></tr></thead>
<tbody>{% for p in patterns %}
<tr><td><kbd>{{ p.tool_name }}</kbd></td><td><code>{{ p.action_pattern }}</code></td><td>{{ p.decision }}</td>
<td>{{ p.count }}</td>
<td><input type="checkbox" role="switch" {% if p.auto_approve %}checked{% endif %} hx-put="/api/approvals/{{ p.id }}/toggle" hx-target="#approvals-list" hx-swap="innerHTML"></td></tr>
{% endfor %}</tbody></table>
{% else %}<p>No approval patterns learned yet. Betty will learn your tool approval preferences as you use Claude Code.</p>{% endif %}
