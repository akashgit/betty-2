{% extends "base.html" %}
{% block title %}Betty &mdash; Dashboard{% endblock %}
{% block content %}
<hgroup>
  <h1>Dashboard</h1>
  <p><span class="live-badge"><span class="live-dot"></span>Live</span></p>
</hgroup>
<div id="home-stats" hx-get="/partials/home-stats" hx-trigger="load, every 10s" hx-swap="innerHTML">
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Preferences Learned</div><div class="stat-value">&mdash;</div></div>
    <div class="stat-card"><div class="stat-label">Sessions Analyzed</div><div class="stat-value">&mdash;</div></div>
    <div class="stat-card"><div class="stat-label">Approvals Auto-piloted</div><div class="stat-value">&mdash;</div></div>
  </div>
</div>
<section>
  <h2>Top Preferences</h2>
  <div id="home-prefs" hx-get="/partials/home-prefs" hx-trigger="load, every 10s" hx-swap="innerHTML">
    <p aria-busy="true">Loading...</p>
  </div>
</section>
<section>
  <h2>Recent Sessions</h2>
  <div id="home-sessions" hx-get="/partials/home-sessions" hx-trigger="load, every 10s" hx-swap="innerHTML">
    <p aria-busy="true">Loading...</p>
  </div>
</section>
{% endblock %}
